# Nginx：主站前端 + 模块前端静态资源 + /api 反代到主站后端（架构文档第 18 章）

# 认证类接口限流（防刷登录/验证码）。真实客户端 IP 依赖后端 TOYBOX_TRUST_PROXY=true 读 X-Forwarded-For。
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;

server {
    listen 80;
    server_name _;
    client_max_body_size 20m;

    # 若前面还有 CDN/外层反代（Cloudflare/宝塔/1Panel/另一层 Nginx），必须启用并填可信代理网段，
    # 否则 $remote_addr 会是代理 IP、限流会把所有用户聚合成一个 IP：
    # set_real_ip_from 173.245.48.0/20;     # 例：Cloudflare 网段（按官方列表补全全部）
    # set_real_ip_from 10.0.0.0/8;          # 例：内网外层反代网段
    # real_ip_header X-Forwarded-For;       # Cloudflare 用 CF-Connecting-IP
    # real_ip_recursive on;

    # 安全响应头（保护 SPA；后端 API 另有中间件）
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    # 主站 CSP（本应用使用内联样式，故 style 需 'unsafe-inline'）。上线前请在浏览器自测后启用：
    # add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; frame-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'" always;

    # 认证接口：额外 Nginx 层限流
    location /api/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://toybox-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 主站后端：核心 / 后台 / 模块网关
    location /api/ {
        proxy_pass http://toybox-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # 模块前端静态资源（iframe 承载）：强制沙箱化，即使被直接顶层访问也是不透明源，
    # 杜绝模块内的 XSS 升级为主站级 XSS（拿不到主站 Cookie）。
    location /module-assets/ {
        alias /var/www/modules/assets/;
        add_header Content-Security-Policy "sandbox allow-scripts" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        # iframe 用 sandbox(allow-scripts) → 不透明源(Origin: null)；<script type="module"> 一律以 CORS 拉取，
        # 缺 ACAO 会被浏览器拦截导致模块整页空白。这些是公开静态产物，放开跨源读取是安全的。
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri $uri/ =404;
    }

    # 主站前端 SPA
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}

