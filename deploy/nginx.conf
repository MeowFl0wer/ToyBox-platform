# Nginx：主站前端 + 模块前端静态资源 + /api 反代到主站后端（架构文档第 18 章）
server {
    listen 80;
    server_name _;
    client_max_body_size 20m;

    # 安全响应头（保护 SPA 与模块静态资源；后端 API 另有中间件）
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    # 上线 HTTPS 后启用 HSTS：
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP（按需放宽；本应用使用内联样式，故 style 需 'unsafe-inline'；模块走同源 iframe，frame-src 'self'）：
    # add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; frame-src 'self'; connect-src 'self'" always;

    # 主站后端：认证 / 核心 / 后台 / 模块网关
    location /api/ {
        proxy_pass http://toybox-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # 模块前端静态资源（iframe 承载）：来自共享 data 卷的 modules/assets
    location /module-assets/ {
        alias /var/www/modules/assets/;
        try_files $uri $uri/ =404;
    }

    # 主站前端 SPA
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
