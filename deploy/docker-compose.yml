# ToyBox 主站生产部署（架构文档第 17 章）
# 用法：
#   cd deploy && cp .env.example .env && 编辑 .env
#   docker compose up -d --build
#
# 安全要点：主站 backend **不**持有 docker.sock；只有 deploy_worker 经 socket-proxy 访问
# 受限的 Docker API（仅 containers/images/networks，禁用 exec 等）。建模块库由 worker 用
# psycopg 直连 Postgres 完成，不依赖 docker exec。
name: toybox

services:
  db:
    image: postgres:16
    container_name: toybox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: main_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [toybox_net]

  # 受限 Docker API 代理：仅暴露部署所需端点，避免把 root 级 docker.sock 直接给应用
  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: toybox-socket-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      INFO: 1
      POST: 1          # 允许创建/构建/启动（构建镜像 /build、运行容器 /containers/create）
      EXEC: 0          # 禁用 exec
      SECRETS: 0
      SWARM: 0
      SYSTEM: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [deploy_net]      # 仅在部署专网，模块/业务容器无法访问到它

  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    container_name: toybox-backend
    restart: unless-stopped
    env_file: .env
    environment:
      TOYBOX_DB_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@toybox-postgres:5432/main_db
      TOYBOX_DEPLOY_MODE: docker
      TOYBOX_WORKER_INPROC: "false"     # 安装/重启/卸载任务交给 deploy_worker，主站不碰 docker
      TOYBOX_TRUST_PROXY: "true"         # 经 Nginx 反代，读 X-Forwarded-For 取真实客户端 IP（限流按客户端聚合）
    volumes:
      - data:/app/server/data            # 模块源码/前端产物/密钥（与 worker、web 共享）
    depends_on: [db]
    networks: [toybox_net]               # 注意：未挂载 docker.sock

  deploy_worker:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    container_name: toybox-deploy-worker
    restart: unless-stopped
    command: python -m app.worker.deploy_worker
    env_file: .env
    environment:
      TOYBOX_DB_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@toybox-postgres:5432/main_db
      TOYBOX_DEPLOY_MODE: docker
      TOYBOX_DOCKER_NETWORK: toybox_net
      DOCKER_HOST: tcp://toybox-socket-proxy:2375     # 经代理访问受限 Docker API
      TOYBOX_POSTGRES_HOST: toybox-postgres           # 建模块库用（psycopg 直连）
      TOYBOX_POSTGRES_SUPERUSER: postgres
      TOYBOX_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - data:/app/server/data
    depends_on: [db, socket-proxy]
    networks: [toybox_net, deploy_net]   # 业务网取 Postgres / 建模块容器；部署专网访问 socket-proxy

  web:
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
    container_name: toybox-web
    restart: unless-stopped
    # ⚠️ 生产必须 HTTPS：dev_mode=false 时刷新 Cookie 为 Secure，仅 HTTP(80) 会导致登录态无法保持。
    #    请「启用下方 443 + 证书（见 nginx.conf 模板）」或「置于已终止 TLS 的外层反代之后」，
    #    不要把当前仅 80 的配置直接作为公网入口。
    ports:
      - "80:80"
      # - "443:443"   # 配置 TLS 后启用（并在 nginx.conf 启用 443 server 块与 80→443 跳转）
    volumes:
      - data:/var/www:ro      # 提供 /module-assets（= data/modules/assets）
    depends_on: [backend]
    networks: [toybox_net]

volumes:
  pgdata:
  data:

networks:
  toybox_net:
    name: toybox_net          # 业务网：固定名，模块容器 --network toybox_net 需与此一致
  deploy_net:
    name: deploy_net          # 部署专网：仅 socket-proxy + deploy_worker，internal 不通外网
    internal: true

# 注：若不希望 worker 在主机构建镜像，可改为 CI 构建并推镜像仓库、worker 仅 pull 运行，
# 这样 socket-proxy 仅需 CONTAINERS/IMAGES/POST，进一步收敛权限。
